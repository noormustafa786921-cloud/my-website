<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background:#0f172a;
      color:white;
      font-family:sans-serif;
      padding:15px;
    }

    .card {
      background:#1e293b;
      padding:20px;
      margin:10px 0;
      border-radius:10px;
    }

    h2 {
      color:#22c55e;
    }

    input {
      padding:10px;
      width:100%;
      border-radius:5px;
      border:none;
      margin-bottom:10px;
    }

    button {
      padding:10px;
      margin-right:10px;
      border:none;
      border-radius:5px;
      background:#22c55e;
      color:white;
      cursor:pointer;
    }
  </style>
</head>

<body>

<h2>Hello User 👋</h2>

<div class="card">
  <h3>Today Earning</h3>
  <p>₹ 14,863</p>
</div>

<div class="card">
  <h3>Last 7 Days</h3>
  <p>₹ 18,866</p>
</div>

<div class="card">
  <h3>Total Earning</h3>
  <p>₹ 96,893</p>
</div>

<h2>Login / Signup</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<p id="msg"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-analytics.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBj_6FQIPVyDWkHtvLaPGEgEHdTwnataMw",
  authDomain: "my-website-9ef96.firebaseapp.com",
  projectId: "my-website-9ef96",
  storageBucket: "my-website-9ef96.appspot.com",
  messagingSenderId: "142788297402",
  appId: "1:142788297402:web:3e32b79c2ade7e73187883",
  measurementId: "G-HZDD8NS2XY"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const auth = getAuth();

// SIGNUP
window.signup = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      document.getElementById("msg").innerText = "Signup successful ✅";
    })
    .catch((error) => {
      document.getElementById("msg").innerText = error.message;
    });
};

// LOGIN
window.login = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      document.getElementById("msg").innerText = "Login successful ✅";
    })
    .catch((error) => {
      document.getElementById("msg").innerText = error.message;
    });
};

</script>

</body>
</html>
